name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend build & boot check
    runs-on: ubuntu-24.04
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile check
        run: python -m compileall backend -q
      - name: Boot check (app imports, routes load)
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ci_test_db
          JWT_SECRET: ci-secret-not-for-production
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ci-password
          DISPATCH_USERNAME: dispatch
          DISPATCH_PASSWORD: ci-password
          CORS_ORIGINS: "*"
          AUTOMATION_MODE: test
          LOG_DIR: /tmp/grewal-logs
        run: |
          python -c "from server import app; print('Routes loaded:', len(app.routes))"
          nohup uvicorn server:app --host 127.0.0.1 --port 8001 & sleep 6
          curl -fsS http://127.0.0.1:8001/health
          curl -fsS http://127.0.0.1:8001/api/health

  frontend:
    name: Frontend npm build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (clean, no legacy flags)
        working-directory: frontend
        run: npm ci
      - name: Production build
        working-directory: frontend
        env:
          CI: "false"
        run: npm run build
