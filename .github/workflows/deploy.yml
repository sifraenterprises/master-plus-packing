name: Deploy to Hostinger VPS

# Runs automatically on pushes to main when the repository variable AUTO_DEPLOY is "true",
# or manually from the Actions tab (workflow_dispatch).
#
# Required repository SECRETS (Settings -> Secrets and variables -> Actions):
#   VPS_HOST      e.g. 203.0.113.10 or yourdomain.com
#   VPS_USER      e.g. root
#   VPS_SSH_KEY   private key with access to the VPS (ssh-keygen -t ed25519)
# Optional VARIABLES:
#   AUTO_DEPLOY   "true" to deploy on every push to main
#   APP_DIR       app path on the VPS (default /opt/grewal)
#   VPS_PORT      SSH port (default 22)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.AUTO_DEPLOY == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy via SSH (update.sh with automatic rollback)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ vars.APP_DIR || '/opt/grewal' }}
            bash deploy/update.sh
